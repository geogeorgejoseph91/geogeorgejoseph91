<svg width="1200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f2540"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D2FF"/>
      <stop offset="70%" stop-color="#3A7BD5"/>
      <stop offset="100%" stop-color="#3A7BD5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Subtle dot decorations -->
  <circle cx="80" cy="50" r="60" fill="#00D2FF" fill-opacity="0.04"/>
  <circle cx="1120" cy="150" r="80" fill="#3A7BD5" fill-opacity="0.05"/>
  <circle cx="600" cy="100" r="150" fill="#3A7BD5" fill-opacity="0.03"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" rx="2"/>
  <!-- Bottom accent line -->
  <rect x="0" y="197" width="1200" height="3" fill="url(#accentGrad)" rx="2"/>

  <!-- Left side bar -->
  <rect x="90" y="55" width="2" height="90" fill="#00D2FF" fill-opacity="0.5" rx="1"/>
  <!-- Right side bar -->
  <rect x="1108" y="55" width="2" height="90" fill="#3A7BD5" fill-opacity="0.5" rx="1"/>

  <!-- Main name text -->
  <text x="600" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="900" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="6">GEO GEORGE</text>

  <!-- Decorative dots -->
  <text x="600" y="128" font-family="Arial" font-size="12" fill="#00D2FF" fill-opacity="0.6" text-anchor="middle" letter-spacing="12">◆ ◆ ◆</text>

  <!-- Subtitle -->
  <text x="600" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" fill="#8ab4cc" text-anchor="middle" letter-spacing="1">Senior UI Architect &amp; Lead  ·  Python Data Science &amp; AI/ML Specialist</text>
</svg>
